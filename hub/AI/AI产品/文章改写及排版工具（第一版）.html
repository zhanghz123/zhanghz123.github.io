        // 调用文章改写（卡兹克版）API
        async function callKazikRewriteApi(content) {
            const apiUrl = 'https://api.siliconflow.cn/v1/chat/completions';
            const apiKey = 'sk-eszhlkfkcdsngxlhvoevczutbsiqtwqdpjrmeqgknatwaeyv';
            
            // 构建请求数据 - 严格按照用户提供的curl命令格式
            const requestData = {
                "thinking_budget": 4096,
                "top_p": 0.7,
                "model": "deepseek-ai/DeepSeek-V3.1",
                "stream": true,
                "max_tokens": 10000,
                "messages": [
                    {
                        "content": "你是一位文章改写扩写大师，请将下面的文章草稿按要求改写扩写。改写扩写要求：# 吴晓波商业分析风格写作模版 # 对文章草稿内容可扩展但不能删减  ## 核心特征 - 数据驱动的叙述方式 - 历史维度的纵向对比 - 国际视野的横向比较 - 产业逻辑的深层剖析 - 商业本质的洞察  ## 文章结构  ### 1. 开篇钩子（Hook） - 用一个具体的数据或现象切入 - 设置悬念，引发思考 - 时间坐标定位  ### 2. 宏观背景（Context） - 政策环境分析 - 经济周期判断 - 行业格局变化 - 技术变革影响  ### 3. 数据支撑（Data） - 关键数据指标 - 增长曲线展示 - 市场份额变化 - 投入产出分析  ### 4. 案例剖析（Case） - 典型企业样本 - 商业模式解析 - 成功要素提炼 - 失败教训总结  ### 5. 趋势判断（Trend） - 发展周期预测 - 技术演进方向 - 市场机会识别 - 风险挑战预警  ### 6. 商业本质（Essence） - 价值创造逻辑 - 商业模型重构 - 竞争壁垒分析 - 盈利模式创新  ### 7. 结论建议（Conclusion） - 核心观点总结 - 行动策略建议 - 投资价值评估 - 未来展望  ## 语言风格 - 专业但不晦涩 - 数据化表达 - 历史纵深感 - 国际比较视野 - 商业洞察深度  ## 常用句式 - \"从数据上看...\" - \"如果我们把时间的指针拨回到...\" - \"对比国外成熟市场...\" - \"这背后反映了一个深刻的商业逻辑...\" - \"从历史周期来看...\" - \"这意味着什么？\" - \"商业的本质在于...\"。以下是文章草稿：{{文章草稿}}".replace('{{文章草稿}}', content),
                        "role": "user"
                    }
                ]
            };

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                if (!response.ok) {
                    throw new Error(`API请求失败: ${response.status} ${response.statusText}`);
                }

                // 开始流式读取
                kazikRewriteStreaming = true;
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                document.getElementById('kazikRewriteContent').innerHTML = '';
                document.getElementById('kazikRewriteContent').className = 'rewrite-content-area rewrite-streaming';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') {
                                kazikRewriteStreaming = false;
                                document.getElementById('kazikRewriteContent').className = 'rewrite-content-area';
                                document.getElementById('kazikRewriteReplaceBtn').disabled = false;
                                document.getElementById('kazikRewriteReplaceBtn').textContent = '替换内容';
                                return;
                            }

                            try {
                                const parsed = JSON.parse(data);
                                const content = parsed.choices?.[0]?.delta?.content;
                                if (content) {
                                    kazikRewriteContent += content;
                                    document.getElementById('kazikRewriteContent').textContent = kazikRewriteContent;
                                    // 滚动到底部
                                    document.getElementById('kazikRewriteContent').scrollTop = document.getElementById('kazikRewriteContent').scrollHeight;
                                }
                            } catch (e) {
                                console.warn('解析数据失败:', e);
                            }
                        }
                    }
                }

                kazikRewriteStreaming = false;
                document.getElementById('kazikRewriteContent').className = 'rewrite-content-area';
                document.getElementById('kazikRewriteReplaceBtn').disabled = false;
                document.getElementById('kazikRewriteReplaceBtn').textContent = '替换内容';

            } catch (error) {
                console.error('卡兹克版AI API调用失败:', error);
                document.getElementById('kazikRewriteError').style.display = 'block';
                document.getElementById('kazikRewriteError').textContent = `AI服务调用失败: ${error.message}`;
                document.getElementById('kazikRewriteContent').innerHTML = '<div class="rewrite-loading">AI服务连接失败</div>';
                document.getElementById('kazikRewriteContent').className = 'rewrite-content-area';
                kazikRewriteStreaming = false;
            }
        }

    <script>
        // 配置 marked

                if (lang && hljs.getLanguage(lang)) {

                    } catch (__) {}
                }
                return hljs.highlightAuto(code).value;

            breaks: true,
            gfm: true,
            headerIds: true,
            mangle: false,
            pedantic: false,
            sanitize: false,
            smartLists: true,
            smartypants: true,
            xhtml: false
        });

        // 获取DOM元素
        const markdownInput = document.getElementById('markdownInput');
        const markdownPreview = document.getElementById('markdownPreview');
        const charCount = document.getElementById('charCount');
        const wordCount = document.getElementById('wordCount');
        const renderTime = document.getElementById('renderTime');
        const previewStatus = document.getElementById('previewStatus');
        
        // 顶部统计元素
        const charCountTop = document.getElementById('charCountTop');
        const wordCountTop = document.getElementById('wordCountTop');
        const lineCountTop = document.getElementById('lineCountTop');
        const editorProgress = document.getElementById('editorProgress');
        
        // 预览面板顶部统计元素
        const previewCharCount = document.getElementById('previewCharCount');
        const previewWordCount = document.getElementById('previewWordCount');
        const previewLineCount = document.getElementById('previewLineCount');
        const previewProgress = document.getElementById('previewProgress');

        // 防抖函数
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // 更新统计信息和进度条
        function updateStats(text) {
            const charLength = text.length;
            const wordLength = text.trim() ? text.trim().split(/\s+/).length : 0;
            const lineCount = text.split('\n').length;
            
            // 计算进度百分比和颜色（基于字符数，最大考虑 10000 字符）
            const progressPercent = Math.min((charLength / 10000) * 100, 100);
            
            // 根据进度设置颜色
            let progressColor = 'linear-gradient(90deg, #28a745, #20c997)';
            if (progressPercent > 80) {
                progressColor = 'linear-gradient(90deg, #dc3545, #fd7e14)'; // 红色到橙色
            } else if (progressPercent > 60) {
                progressColor = 'linear-gradient(90deg, #ffc107, #fd7e14)'; // 黄色到橙色
            } else if (progressPercent > 30) {
                progressColor = 'linear-gradient(90deg, #17a2b8, #28a745)'; // 蓝色到绿色
            }
            
            // 更新底部状态栏
            charCount.textContent = `字符数: ${charLength}`;
            wordCount.textContent = `词数: ${wordLength}`;
            
            // 更新编辑器顶部统计
            charCountTop.textContent = `字符: ${charLength}`;
            wordCountTop.textContent = `词: ${wordLength}`;
            lineCountTop.textContent = `行: ${lineCount}`;
            editorProgress.style.width = `${progressPercent}%`;
            editorProgress.style.background = progressColor;
            
            // 更新预览面板顶部统计（与编辑器同步）
            previewCharCount.textContent = `字符: ${charLength}`;
            previewWordCount.textContent = `词: ${wordLength}`;
            previewLineCount.textContent = `行: ${lineCount}`;
            previewProgress.style.width = `${progressPercent}%`;
            previewProgress.style.background = progressColor;
            
            // 计算阅读时间（假设平均阅读速度为每分钟 200 词）
            const readingTime = Math.ceil(wordLength / 200);
            if (readingTime > 0) {
                previewStatus.textContent = `预计阅读时间: ${readingTime} 分钟`;
            }
        }

        // 更新预览
        function updatePreview() {
            const startTime = performance.now();
            const markdownText = markdownInput.value;
            
            // 更新统计信息
            updateStats(markdownText);
            
            if (!markdownText.trim()) {
                markdownPreview.innerHTML = `
                    <div class="empty-state">
                        <h3>🎯 开始编写 Markdown</h3>
                        <p>在左侧输入 Markdown 内容，这里会实时显示渲染效果</p>
                        <button class="sample-button" onclick="loadSample()">加载示例文档</button>
                    </div>
                `;
                renderTime.textContent = '渲染时间: 0ms';
                previewStatus.textContent = '就绪';
                return;
            }

            try {
                // 将Markdown转换为HTML
                const html = marked.parse(markdownText);
                
                // 使用DOMPurify清理HTML，防止XSS攻击
                const cleanHtml = DOMPurify.sanitize(html);
                
                // 更新预览区域
                markdownPreview.innerHTML = `<div class="markdown-body">${cleanHtml}</div>`;
                
                // 高亮代码块
                markdownPreview.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
                
                const endTime = performance.now();
                renderTime.textContent = `渲染时间: ${Math.round(endTime - startTime)}ms`;
                previewStatus.textContent = '已更新';
                
            } catch (error) {
                console.error('渲染错误:', error);
                markdownPreview.innerHTML = `
                    <div style="color: #d73a49; padding: 16px; background-color: #ffeaea; border-radius: 6px;">
                        <strong>渲染错误:</strong> ${error.message}
                    </div>
                `;
                previewStatus.textContent = '渲染错误';
            }
        }

        // 使用防抖优化性能
        const debouncedUpdate = debounce(updatePreview, 300);

        // 监听输入事件
        markdownInput.addEventListener('input', debouncedUpdate);

        // 监听粘贴事件
        markdownInput.addEventListener('paste', () => {
            setTimeout(updatePreview, 100);
        });

        // 清空编辑器
        function clearEditor() {
            if (confirm('确定要清空所有内容吗？')) {
                markdownInput.value = '';

        // 下载 Markdown 文件
        function downloadMarkdown() {
            const content = markdownInput.value;
            if (!content.trim()) {

            const blob = new Blob([content], { type: 'text/markdown' });

        // 一键复制样式（富文本）
        function copyFormattedContent() {

            try {

                const htmlContent = marked.parse(markdownText);
                
                // 创建适合微信公众号的HTML内容，使用内联样式确保兼容性
                let h1Counter = 0;
                
                // 处理HTML内容，添加微信公众号样式
                const processedContent = htmlContent
                    .replace(/<h1>(.*?)<\/h1>/g, (match, content) => {
                        h1Counter++;
                        const h1Number = h1Counter.toString().padStart(2, '0');
                        return `<h1 style="font-size: 32px; font-weight: 700; margin: 40px 0 24px 0; padding: 16px 20px; background-color: #3f3f3f; color: white; border-radius: 12px;">${h1Number} ${content}</h1>`;
                    })
                    .replace(/<h2>(.*?)<\/h2>/g, '<h2 style="font-size: 24px; font-weight: 600; margin: 32px 0 20px 0; color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 8px;">$1</h2>')
                    .replace(/<h3>(.*?)<\/h3>/g, '<h3 style="font-size: 20px; font-weight: 600; margin: 24px 0 16px 0; color: #34495e;">$1</h3>')

                    if (navigator.clipboard && window.isSecureContext) {
                        const blob = new Blob([fullHtmlContent], { type: 'text/html' });
                        const richTextData = new ClipboardItem({ 'text/html': blob });
                        return navigator.clipboard.write([richTextData]);
